name: TrafficAI Daily Publish

on:
  schedule:
    - cron: '10 23 * * *'   # 08:10 KST
    - cron: '5 3 * * *'     # 12:05 KST
    - cron: '5 6 * * *'     # 15:05 KST
    - cron: '20 9 * * *'    # 18:20 KST
    - cron: '10 13 * * *'   # 22:10 KST
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai

      - name: Run TrafficAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          AI_PROVIDER: openai
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          mkdir -p logs state
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT=$(python3 -c "from datetime import datetime, timedelta; kst = datetime.utcnow() + timedelta(hours=9, minutes=10); print(kst.strftime('%H:%M'))")
            echo "수동 실행: 슬롯 $SLOT"
            python daily_runner.py --slot $SLOT --limit 1
          else
            python daily_runner.py --limit 1
          fi

      - name: Save publish state
        run: |
          git config user.name "TrafficAI Bot"
          git config user.email "trafficai@ddwhat85"
          git add state/ logs/ || true
          git diff --staged --quiet || git commit -m "chore: publish state [skip ci]"
          git push || true
